<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sách lật trang chân thực</title>
    <style>
        /* CSS Cơ bản cho trang web */
        body {
            background-color: #2c3e50;
            /* Màu nền gỗ/tối làm nổi bật sách */
            background-image: radial-gradient(circle, #435b71, #2c3e50);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Định dạng khung sách */
        .book-container {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            /* Đổ bóng cho cả quyển sách */
        }

        /* Định dạng từng trang giấy */
        .page {
            background-color: #fdfcf0;
            /* Màu giấy mộc hơi ngà */
            border: 1px solid #d3c7b3;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Hiệu ứng đổ bóng ở gáy sách tạo độ cong 3D cho giấy */
        .page.--left {
            border-right: 0;
            box-shadow: inset -7px 0 30px -7px rgba(0, 0, 0, 0.3);
        }

        .page.--right {
            border-left: 0;
            box-shadow: inset 7px 0 30px -7px rgba(0, 0, 0, 0.3);
        }

        /* Tùy chỉnh ảnh vừa vặn với trang sách */
        .page img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* Đảm bảo ảnh không bị cắt và luôn căn giữa */
            user-select: none;
            /* Chống bôi đen ảnh khi kéo thả lật trang */
            pointer-events: none;
        }

        /* Phóng to ảnh đầu tiên (0.png) lấp đầy toàn bộ trang sách */
        .page:first-child img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Hiển thị số trang nhỏ ở góc */
        .page-number {
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #888;
        }

        /* Màn hình chờ (Loading) */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .spinner {
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 6px solid #ffffff;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Màn hình chờ tải ảnh -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="progress-text">Đang tải... 0%</div>
    </div>

    <!-- Khung chứa nội dung sách -->
    <div class="book-container" id="book">
        <!-- Javascript sẽ tự động chèn các trang ảnh vào đây -->
    </div>

    <!-- Nhúng thư viện lật sách StPageFlip qua CDN -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // ==========================================
            // CẤU HÌNH SỐ LƯỢNG TRANG ẢNH CỦA BẠN Ở ĐÂY
            const tongSoTrang = 26; // Thay số 10 bằng biến 'x' - tổng số ảnh bạn có
            // ==========================================

            const bookElement = document.getElementById('book');
            const loadingScreen = document.getElementById('loading-screen');
            const progressText = document.getElementById('progress-text');

            let loadedImagesCount = 0;
            const totalImages = tongSoTrang + 1; // Tính cả trang 0.png

            // Cập nhật phần trăm tiến trình
            function updateProgress() {
                const percent = Math.floor((loadedImagesCount / totalImages) * 100);
                progressText.innerText = `Đang tải... ${percent}%`;

                // Khi đã tải xong tất cả ảnh
                if (loadedImagesCount === totalImages) {
                    // Đợi thêm 300ms để người xem nhìn rõ số 100% trước khi ẩn
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        initBook();
                    }, 300);
                }
            }

            // Đóng gói logic tạo sách vào một hàm
            function initBook() {

                // Vòng lặp tự động tạo mã HTML bắt đầu từ 0.png
                for (let i = 0; i <= tongSoTrang; i++) {
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';

                    // Thẻ img sẽ trỏ tới thư mục assets/1.png, assets/2.png...
                    // Nếu không tải được ảnh, nó sẽ hiển thị ảnh giả để web không bị lỗi giao diện
                    pageDiv.innerHTML = `
                        <img src="assets/${i}.png" alt="Trang ${i}" onerror="this.src='https://via.placeholder.com/400x600/fdfcf0/888888?text=Trang+${i}'">
                        <div class="page-number">${i}</div>
                    `;
                    bookElement.appendChild(pageDiv);
                }

                // Tự động tính toán kích thước để sách to vừa vặn khoảng 88% màn hình
                let pageHeight = Math.floor(window.innerHeight * 0.88);
                let pageWidth = Math.floor(pageHeight * (400 / 600)); // Giữ nguyên tỷ lệ trang (4:6)

                // Đảm bảo không bị tràn ngang khi sách mở ra 2 trang (dành cho màn hình tỉ lệ hẹp)
                if (pageWidth * 2 > window.innerWidth * 0.9) {
                    pageWidth = Math.floor((window.innerWidth * 0.9) / 2);
                    pageHeight = Math.floor(pageWidth * (600 / 400));
                }

                // Khởi tạo thư viện lật sách
                const pageFlip = new St.PageFlip(bookElement, {
                    width: pageWidth,      // Sử dụng chiều rộng tự động tính
                    height: pageHeight,    // Sử dụng chiều cao tự động tính
                    size: "fixed",         // Giữ kích thước cố định để trông giống sách thật
                    minWidth: 100,         // Giảm kích thước tối thiểu để vừa màn hình dọc của điện thoại
                    maxWidth: 1500,        // Mở rộng giới hạn để cho phép sách trên màn hình to
                    minHeight: 150,        // Giảm kích thước tối thiểu
                    maxHeight: 2000,       // Mở rộng giới hạn
                    maxShadowOpacity: 0.6, // Độ đậm của bóng đổ khi đang lật giấy (0 đến 1)
                    showCover: false,      // Tắt chế độ bìa đóng để sách luôn mở 2 trang ngay từ đầu
                    usePortrait: false,    // Ép buộc luôn hiển thị 2 trang (quyển sách mở) kể cả trên điện thoại
                    mobileScrollSupport: false
                });

                // Tải toàn bộ cấu trúc vừa tạo vào trong sách
                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
            }

            // Bắt đầu tải ngầm ảnh về Cache
            function preloadImages() {
                for (let i = 0; i <= tongSoTrang; i++) {
                    const img = new Image();
                    // Ảnh tải thành công
                    img.onload = () => {
                        loadedImagesCount++;
                        updateProgress();
                    };
                    // Ảnh lỗi cũng đếm để tiến trình không bị kẹt mãi ở 99%
                    img.onerror = () => {
                        loadedImagesCount++;
                        updateProgress();
                    };
                    img.src = `assets/${i}.png`; // Bắt đầu tải
                }
            }

            // Kích hoạt tiến trình tải ảnh
            preloadImages();
        });
    </script>
</body>

</html>
