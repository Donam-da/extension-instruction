<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension installation guide</title>
    <style>
        /* CSS Cơ bản cho trang web */
        body {
            background-color: #2c3e50;
            /* Màu nền gỗ/tối làm nổi bật sách */
            background-image: radial-gradient(circle, #435b71, #2c3e50);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Định dạng khung sách */
        .book-container {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            /* Đổ bóng cho cả quyển sách */
        }

        /* Định dạng từng trang giấy */
        .page {
            background-color: #fdfcf0;
            /* Màu giấy mộc hơi ngà */
            border: 1px solid #d3c7b3;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* Ép trình duyệt dùng GPU để xử lý (Tăng tốc phần cứng) giúp lật mượt hơn */
            transform: translateZ(0);
            will-change: transform;
        }

        /* Hiệu ứng đổ bóng ở gáy sách tạo độ cong 3D cho giấy */
        .page.--left {
            border-right: 0;
            box-shadow: inset -7px 0 30px -7px rgba(0, 0, 0, 0.3);
        }

        .page.--right {
            border-left: 0;
            box-shadow: inset 7px 0 30px -7px rgba(0, 0, 0, 0.3);
        }

        /* Tùy chỉnh ảnh vừa vặn với trang sách */
        .page img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* Đảm bảo ảnh không bị cắt và luôn căn giữa */
            user-select: none;
            /* Chống bôi đen ảnh khi kéo thả lật trang */
            pointer-events: none;
        }

        /* Phóng to ảnh đầu tiên (0.png) lấp đầy toàn bộ trang sách */
        .page:first-child img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Hiển thị số trang nhỏ ở góc */
        .page-number {
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #888;
        }

        /* Màn hình chờ (Loading) */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        /* Dòng chữ trạng thái với dấu chấm động */
        #loading-status {
            margin-top: 15px;
            font-size: 16px;
            font-weight: normal;
            color: #bdc3c7;
            /* Màu xám sáng */
        }

        .spinner {
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 6px solid #ffffff;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Tối ưu hóa hiệu năng riêng cho thiết bị di động (Mobile) */
        @media (max-width: 768px) {
            .book-container {
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
                /* Giảm độ nặng của bóng đổ khung sách */
            }

            .page.--left,
            .page.--right {
                /* Tắt bóng đổ 3D ở gáy sách trên điện thoại vì nó làm tụt FPS rất nhiều khi lật */
                box-shadow: none;
            }
        }
    </style>
</head>

<body>

    <!-- Màn hình chờ tải ảnh -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="progress-text">Đang tải... 0%</div>
        <div id="loading-status">Đang truy cập vào trang hướng dẫn</div>
    </div>

    <!-- Khung chứa nội dung sách -->
    <div class="book-container" id="book">
        <!-- Javascript sẽ tự động chèn các trang ảnh vào đây -->
    </div>

    <!-- Nhúng thư viện lật sách StPageFlip qua CDN -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // ==========================================
            // CẤU HÌNH SỐ LƯỢNG TRANG ẢNH CỦA BẠN Ở ĐÂY
            const tongSoTrang = 26; // Thay số 10 bằng biến 'x' - tổng số ảnh bạn có
            // ==========================================

            const bookElement = document.getElementById('book');
            const loadingScreen = document.getElementById('loading-screen');
            const progressText = document.getElementById('progress-text');
            const loadingStatus = document.getElementById('loading-status');

            let loadedImagesCount = 0;
            const totalImages = tongSoTrang + 1; // Tính cả trang 0.png

            // Hiệu ứng dấu chấm động (1 chấm, 2 chấm, 3 chấm)
            let dotCount = 0;
            const dotInterval = setInterval(() => {
                dotCount = (dotCount + 1) % 4; // Lặp lại giá trị 0, 1, 2, 3
                // Dùng hàm repeat để nhân bản số lượng dấu chấm theo dotCount
                loadingStatus.innerText = 'Đang truy cập vào trang hướng dẫn' + '.'.repeat(dotCount);
            }, 400); // Thay đổi dấu chấm mỗi 400ms

            // Cập nhật phần trăm tiến trình
            function updateProgress() {
                const percent = Math.floor((loadedImagesCount / totalImages) * 100);
                progressText.innerText = `Đang tải... ${percent}%`;

                // Khi đã tải xong tất cả ảnh
                if (loadedImagesCount === totalImages) {
                    // Dừng hiệu ứng dấu chấm động
                    clearInterval(dotInterval);

                    // Đợi thêm 300ms để người xem nhìn rõ số 100% trước khi ẩn
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        initBook();
                    }, 300);
                }
            }

            // Đóng gói logic tạo sách vào một hàm
            function initBook() {

                // Vòng lặp tự động tạo mã HTML bắt đầu từ 0.png
                for (let i = 0; i <= tongSoTrang; i++) {
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';

                    // Thẻ img sẽ trỏ tới thư mục assets/1.png, assets/2.png...
                    // Nếu không tải được ảnh, nó sẽ hiển thị ảnh giả để web không bị lỗi giao diện
                    pageDiv.innerHTML = `
                        <img src="assets/${i}.png" alt="Trang ${i}" onerror="this.src='https://via.placeholder.com/400x600/fdfcf0/888888?text=Trang+${i}'">
                        <div class="page-number">${i}</div>
                    `;
                    bookElement.appendChild(pageDiv);
                }

                // Phát hiện xem thiết bị đang ở chế độ dọc hay ngang
                let isPortrait = window.innerWidth < window.innerHeight;

                // Lấy trang đang đọc hiện tại nếu có lưu trước đó (do xoay màn hình)
                let savedPage = parseInt(sessionStorage.getItem('currentFlipPage')) || 0;
                sessionStorage.removeItem('currentFlipPage'); // Xóa sau khi lấy

                // Tự động tính toán kích thước để sách to vừa vặn khoảng 88% màn hình
                let pageHeight = Math.floor(window.innerHeight * 0.88);
                let pageWidth = Math.floor(pageHeight * (400 / 600)); // Giữ nguyên tỷ lệ trang (4:6)

                if (isPortrait) {
                    // Chế độ dọc: Tự động điều chỉnh để 1 trang vừa vặn với chiều ngang màn hình
                    if (pageWidth > window.innerWidth * 0.9) {
                        pageWidth = Math.floor(window.innerWidth * 0.9);
                        pageHeight = Math.floor(pageWidth * (600 / 400));
                    }
                } else {
                    // Chế độ ngang: Đảm bảo 2 trang không bị tràn ngang
                    if (pageWidth * 2 > window.innerWidth * 0.9) {
                        pageWidth = Math.floor((window.innerWidth * 0.9) / 2);
                        pageHeight = Math.floor(pageWidth * (600 / 400));
                    }
                }

                // Khởi tạo thư viện lật sách
                window.pageFlip = new St.PageFlip(bookElement, {
                    width: pageWidth,      // Sử dụng chiều rộng tự động tính
                    height: pageHeight,    // Sử dụng chiều cao tự động tính
                    size: "fixed",         // Giữ kích thước cố định để trông giống sách thật
                    minWidth: 100,
                    maxWidth: 1500,
                    minHeight: 150,
                    maxHeight: 2000,
                    maxShadowOpacity: 0.6,
                    showCover: isPortrait, // BẬT chế độ bìa ở màn dọc, TẮT ở màn ngang để 0.png nằm bên trái
                    usePortrait: true,     // BẬT tính năng chuyển 1 trang khi ở màn hình dọc và 2 trang ở màn hình ngang
                    startPage: savedPage,  // Mở lại đúng trang đang đọc nếu vừa xoay màn hình
                    mobileScrollSupport: false
                });

                // Tải toàn bộ cấu trúc vừa tạo vào trong sách
                window.pageFlip.loadFromHTML(document.querySelectorAll('.page'));

                // Xử lý khi người dùng xoay điện thoại (đổi dọc <-> ngang)
                window.addEventListener('resize', () => {
                    const currentIsPortrait = window.innerWidth < window.innerHeight;
                    if (currentIsPortrait !== isPortrait) {
                        // Lưu lại trang hiện tại và tải lại trang web để tính toán lại kích thước hiển thị
                        sessionStorage.setItem('currentFlipPage', window.pageFlip.getCurrentPageIndex());
                        location.reload();
                    }
                });
            }

            // Bắt đầu tải ngầm ảnh về Cache
            function preloadImages() {
                for (let i = 0; i <= tongSoTrang; i++) {
                    const img = new Image();
                    // Ảnh tải thành công
                    img.onload = () => {
                        loadedImagesCount++;
                        updateProgress();
                    };
                    // Ảnh lỗi cũng đếm để tiến trình không bị kẹt mãi ở 99%
                    img.onerror = () => {
                        loadedImagesCount++;
                        updateProgress();
                    };
                    img.src = `assets/${i}.png`; // Bắt đầu tải
                }
            }

            // Kích hoạt tiến trình tải ảnh
            preloadImages();
        });
    </script>
</body>

</html>
